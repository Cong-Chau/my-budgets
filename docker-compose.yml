services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: finance_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-200604}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d finance_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      target: production
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - ./backend/.env
    environment:
      # Override values that differ between local and Docker
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:-200604}@postgres:5432/finance_db?schema=public
      PORT: 3000
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:2604}

  frontend:
    build:
      context: ./frontend
      target: production
      args:
        VITE_API_URL: /api
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${APP_PORT:-2604}:80"

volumes:
  postgres_data:
